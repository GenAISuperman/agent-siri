apiVersion: apps/v1
kind: Deployment
metadata:
  name: "siri"
  namespace: "agents-cloudteam"
  labels:
    app: "siri"
    team: "cloudteam"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "siri"
  template:
    metadata:
      labels:
        app: "siri"
        team: "cloudteam"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-siri"
      containers:
        - name: "siri"
          image: "acrshoppoc.azurecr.io/agents/siri:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-siri"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
